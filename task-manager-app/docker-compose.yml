version: "3.9"

services:
  backend:
    image: DockerHub Username/task-backend:latest
    container_name: task-backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    restart: always
    networks:
      - task-network

  frontend:
    image: DockerHub UserName/task-frontend:latest
    container_name: task-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
    networks:
      - task-network

networks:
  task-network:
    driver: bridge