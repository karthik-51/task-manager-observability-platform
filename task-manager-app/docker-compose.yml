version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: task-backend
    ports:
      - "5000:5000"
    networks:
      - task-network

  frontend:
    build:
      context: ./frontend
    container_name: task-frontend
    ports:
      - "80:80"
    networks:
      - task-network
    depends_on:
      - backend

networks:
  task-network:
    driver: bridge
