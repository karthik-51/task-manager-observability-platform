[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     info
    Parsers_File  parsers.conf

# =========================
# INPUTS - JENKINS LOGS
# =========================

[INPUT]
    Name              tail
    Path              /var/lib/jenkins/workspace/task-manager-pipeline/jenkins-logs/*.log
    Tag               jenkins.workspace.*
    DB                /fluent-bit/state/jenkins-workspace.db
    Mem_Buf_Limit     50MB
    Skip_Long_Lines   On
    Refresh_Interval  5
    Read_From_Head    On
    Path_Key          source_file

[INPUT]
    Name              tail
    Path              /var/lib/jenkins/jobs/task-manager-pipeline/builds/*/archive/jenkins-logs/*.log
    Tag               jenkins.archive.*
    DB                /fluent-bit/state/jenkins-archive.db
    Mem_Buf_Limit     50MB
    Skip_Long_Lines   On
    Refresh_Interval  10
    Read_From_Head    On
    Path_Key          source_file

[INPUT]
    Name              tail
    Path              /var/lib/jenkins/jobs/task-manager-pipeline/builds/*/log
    Tag               jenkins.console.*
    DB                /fluent-bit/state/jenkins-console.db
    Mem_Buf_Limit     50MB
    Skip_Long_Lines   On
    Refresh_Interval  10
    Read_From_Head    On
    Path_Key          source_file

# =========================
# INPUTS - DOCKER LOGS
# =========================

[INPUT]
    Name              tail
    Path              /var/lib/docker/containers/*/*-json.log
    Tag               docker.*
    Parser            docker
    DB                /fluent-bit/state/docker.db
    Mem_Buf_Limit     100MB
    Skip_Long_Lines   On
    Refresh_Interval  5
    Read_From_Head    On
    Path_Key          source_file

# =========================
# FILTERS - JENKINS
# =========================

[FILTER]
    Name    modify
    Match   jenkins.*
    Add     host jenkins-ec2
    Add     source_type jenkins
    Add     pipeline task-manager-pipeline

# =========================
# FILTERS - DOCKER
# =========================

[FILTER]
    Name    modify
    Match   docker.*
    Add     host task-deploy-ec2
    Add     source_type docker
    Add     environment production

# =========================
# OUTPUT - JENKINS LOGS
# =========================

[OUTPUT]
    Name                opensearch
    Match               jenkins.*
    Host                //opensearch Ec2 Ip Address
    Port                9200
    HTTP_User           admin
    HTTP_Passwd        //opensearch Password
    tls                 On
    tls.verify          Off
    Logstash_Format     On
    Logstash_Prefix     jenkins-logs
    Suppress_Type_Name  On
    Generate_ID         On
    Workers             2
    Trace_Error         On

# =========================
# OUTPUT - DOCKER LOGS
# =========================

[OUTPUT]
    Name                opensearch
    Match               docker.*
    Host                //opensearch Ec2 Ip Address
    Port                9200
    HTTP_User           admin
    HTTP_Passwd         //opensearch Password
    tls                 On
    tls.verify          Off
    Logstash_Format     On
    Logstash_Prefix     task-deploy-docker
    Suppress_Type_Name  On
    Generate_ID         On
    Workers             2
    Trace_Error         On