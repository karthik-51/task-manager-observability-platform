[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     info
    Parsers_File  parsers.conf

[INPUT]
    Name              tail
    Path              /var/lib/docker/containers/*/*-json.log
    Tag               docker.*
    Parser            docker
    DB                /fluent-bit/state/docker.db
    Mem_Buf_Limit     100MB
    Skip_Long_Lines   On
    Refresh_Interval  5
    Read_From_Head    On
    Path_Key          source_file

[FILTER]
    Name    modify
    Match   docker.*
    Add     host task-deploy-ec2
    Add     source_type docker
    Add     environment production

[OUTPUT]
    Name                opensearch
    Match               docker.*
    Host                opensearch-node
    Port                9200
    HTTP_User           admin
    HTTP_Passwd         Karthik@2003
    tls                 On
    tls.verify          Off
    Logstash_Format     On
    Logstash_Prefix     task-deploy-docker
    Suppress_Type_Name  On
    Generate_ID         On
    Workers             2
    Trace_Error         On
